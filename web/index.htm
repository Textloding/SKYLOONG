<!DOCTYPE html>

<head>
    <meta charset="utf-8">
    <title>极制彩屏模组</title>
    <link rel="stylesheet" href="/css/csss.css">
    <style>
        #textarea_code {
            height: 400px;
            margin: 1%;
            overflow-y: scroll;
            overflow-x: scroll;
            resize: none;
        }

        #textarea_terminal {
            height: 200px;
            margin: 1%;
            overflow-y: scroll;
            overflow-x: scroll;
            resize: none;
        }

        #alertContainer {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .globalContainer {
            margin-bottom: 10px;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            padding-right: 10px;
            border-radius: 6px;
        }

        .smallerContainer {
            margin-bottom: 5px;
            margin-top: 5px;
            padding-top: 10px;
            padding-bottom: 6px;
            padding-left: 10px;
            padding-right: 10px;
            border-radius: 6px;
        }

        #everything {
            border: 1px solid #666;
            margin-bottom: 10px;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 20px;
            padding-right: 10px;
            border-radius: 15px;
        }

        .btn {
            margin-top: 5px;
        }

        .perspective {
            perspective: 5.5cm;
            /* 设置透视距离，增加3D效果的深度 */
        }

        .myfold {
            transform-style: preserve-3d;
            transition: transform 0.4s ease-out, opacity 0.3s;
            transform-origin: top left;
            opacity: 1;
        }

        /* 折叠状态 */
        .myfolded {
            transform: rotateX(-30deg) rotateY(30deg);
            opacity: 0;
            /* 旋转90度，实现折叠效果 */
        }

        .hide {
            display: none;
        }
    </style>
    <script src="/js/jq.js"></script>
    <script>
        function displayJson(code, succ) {
            if (code === 1) {
                var alertDiv = '<div class="alert alert-danger shadow-5">' + succ + '</div>';
            }
            else {
                var alertDiv = '<div class="alert alert-success shadow-5">' + succ + '</div>';
            }
            $("#alertContainer").html(alertDiv);
            $("#alertContainer .alert").css({ opacity: 0, top: "-50px" }).animate({ opacity: 1, top: "0px" }, 500, "easeOutCirc");
            setTimeout(function () {
                $("#alertContainer .alert").css({ top: "0px", opacity: 1 }).animate({ top: "50px", opacity: 0 }, 300, "easeInCirc", function () {
                    $(this).remove();
                });
            }, 1000);
        }
        function fold(objname) {
            var obj = document.getElementById(objname);
            if (obj.classList.contains('myfolded') == false) {
                obj.classList.add('myfolded');
                setTimeout(function () {
                    if (obj.classList.contains('myfolded')) {
                        obj.classList.add('hide');
                    }
                }, 350);
            }
        }
        function unfold(objname) {
            var obj = document.getElementById(objname);
            if (obj.classList.contains('myfolded')) {
                obj.classList.remove('hide');
                setTimeout(function () {
                    obj.classList.remove('myfolded');
                }, 30);
            }
        }
    </script>
</head>

            function updir() {
                if (cwd.lastIndexOf("/") != 0) {
                    cwd = cwd.substring(0, cwd.lastIndexOf("/"));
                }
                else {
                    cwd = '/';
                }
                console.log(cwd);
            }
            function gotodir(filename) {
                if (cwd != "/") {
                    cwd += "/"
                }
                cwd += filename;
            }
            function deleteFile(filename) {
                var xhr = new XMLHttpRequest();
                xhr.open('DELETE', '/edit', true);
                xhr.onreadystatechange = function () {
                    if (xhr.readyState == 4 && xhr.status == 200) {
                        var data = xhr.responseText;
                        displayJson(0, "文件已删除");
                        refreshFileList();
                    }
                };
                xhr.send(filename);
                displayJson(0, "已发送请求");
            }
            function deleteFolder(filename) {
                if (filename == '/') {
                    displayJson(1, "不允许删除根目录");
                    return;
                }
                var xhr = new XMLHttpRequest();
                xhr.open('POST', '/rmrf?path=' + filename, true);
                xhr.onreadystatechange = function () {
                    if (xhr.readyState == 4 && xhr.status == 200) {
                        displayJson(0, "文件夹已删除");
                        var data = xhr.responseText;
                        updir();
                        refreshFileList();
                    }
                };
                xhr.send();
                displayJson(0, "已发送请求");
            }
            function mkdir(filename) {
                if (filename == '/') {
                    displayJson(1, "不允许创建根目录");
                    return;
                }
                var tmp = cwd;
                if (cwd != '/')
                    tmp += '/';
                tmp += filename;
                var xhr = new XMLHttpRequest();
                xhr.open('POST', '/mkdir?path=' + tmp, true);
                xhr.onreadystatechange = function () {
                    if (xhr.readyState == 4) {
                        if (xhr.status == 200) {
                            displayJson(0, "文件夹已创建");
                            gotodir(filename);
                        }
                        else {
                            displayJson(1, "文件夹创建失败");
                        }
                        refreshFileList();
                    }
                };
                xhr.send();
                displayJson(0, "已发送请求");
            }
            function downloadFile(content, fileName) {
                var aEle = document.createElement("a");// 创建a标签
                aEle.download = fileName;// 设置下载文件的文件名
                aEle.href = content;// content为后台返回的下载地址
                aEle.target = '_blank';
                aEle.click();
            }
            function rename(filename, newname) {
                console.log(filename, newname);
                if (filename == newname) return;
                var xhr = new XMLHttpRequest();
                xhr.open('POST', '/rename?path=' + filename + '&new=' + newname, true);
                xhr.onreadystatechange = function () {
                    if (xhr.readyState == 4) {
                        if (xhr.status == 200) {
                            displayJson(0, "重命名成功");
                        }
                        else {
                            displayJson(1, "重命名失败");
                        }
                        refreshFileList();
                    }
                };
                xhr.send();
                displayJson(0, "已发送请求");
            }
            function refreshFileList() {
