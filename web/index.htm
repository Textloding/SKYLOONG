<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>极制彩屏模组</title>
    <link rel="stylesheet" href="/css/csss.css">
    <style>
        #textarea_code {
            height: 400px;
            margin: 1%;
            overflow-y: scroll;
            overflow-x: scroll;
            resize: none;
        }

        #textarea_terminal {
            height: 200px;
            margin: 1%;
            overflow-y: scroll;
            overflow-x: scroll;
            resize: none;
        }

        #alertContainer {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .globalContainer {
            margin-bottom: 10px;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            padding-right: 10px;
            border-radius: 6px;
        }

        .smallerContainer {
            margin-bottom: 5px;
            margin-top: 5px;
            padding-top: 10px;
            padding-bottom: 6px;
            padding-left: 10px;
            padding-right: 10px;
            border-radius: 6px;
        }

        #everything {
            border: 1px solid #666;
            margin-bottom: 10px;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 20px;
            padding-right: 10px;
            border-radius: 15px;
        }

        .btn {
            margin-top: 5px;
        }
    </style>
    <script src="/js/jq.js"></script>
    <script>
        function displayJson(code, succ) {
            if (code === 1) {
                var alertDiv = '<div class="alert alert-danger shadow-5">' + succ + '</div>';
            }
            else {
                var alertDiv = '<div class="alert alert-success shadow-5">' + succ + '</div>';
            }
            $("#alertContainer").html(alertDiv);
            $("#alertContainer .alert").css({ opacity: 0, top: "-50px" }).animate({ opacity: 1, top: "0px" }, 500, "easeOutCirc");
            setTimeout(function () {
                $("#alertContainer .alert").css({ top: "0px", opacity: 1 }).animate({ top: "50px", opacity: 0 }, 300, "easeInCirc", function () {
                    $(this).remove();
                });
            }, 1000);
        }
    </script>
</head>

<body>
    <div class="modal fade" id="modalFilePreview" tabindex="-1" aria-labelledby="modalFilePreviewLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalFilePreviewLabel">文件预览</h5>
                    <button type="button" class="btn-close" data-mdb-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="filePreviewBody">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-info" data-mdb-dismiss="modal"
                        id="btnDownloadPreview">下载</button>
                    <button type="button" class="btn btn-danger" data-mdb-dismiss="modal"
                        id="btnDeletePreview">删除</button>
                    <button type="button" class="btn btn-secondary" data-mdb-dismiss="modal">返回</button>
                </div>
            </div>
        </div>
    </div>
    <div class="container">
        <div id="everything">
            <div class="row">
                <div class="col">
                    <div class="row globalContainer alert-warning shadow-4">
                        <h3>文件管理</h5>
                            <hr />
                            <h6 id="html_cwd">
                                当前目录：
                            </h6>
                            <div class="progress" style="height: 20px;--mdb-progress-bg:#fbf1dd;">
                                <div id="usageProgress" class="progress-bar" role="progressbar" style="width: 0%;">
                                </div>
                            </div>
                            <div class="progress" style="height: 20px;--mdb-progress-bg:#fbf1dd;">
                                <div id="uploadProgress" class="progress-bar" role="progressbar" style="width: 0%;">
                                </div>
                            </div>
                            <table class="table table-striped table-sm" id="tableFile">
                                <tbody>
                                    <tr>
                                        <td>加载中...</td>
                                    </tr>
                                </tbody>
                            </table>
                    </div>
                    <div class="col globalContainer alert-primary shadow-4">
                        <button type="button" class="btn btn-primary" id="btnRefresh"
                            style="margin-left: 5px;">刷新</button>
                        <button type="button" class="btn btn-warning" id="btnUpload"
                            style="margin-left: 5px;">上传</button>
                        <input type="file" id="fileInput" style="visibility: hidden; width: 0px;height: 0px;">
                        <button type="button" class="btn btn-danger" id="btnReboot"
                            style="margin-left: 5px;">重启</button>
                        <button type="button" class="btn btn-success" id="btnSaveConfig"
                            style="margin-left: 5px;">保存设置</button>
                    </div>
                </div>
            </div>
        </div>
        <button type="button" data-mdb-ripple-init data-mdb-modal-init data-mdb-target="#modalFilePreview"
            id="openFilePreview" style="display: none;">
            文件预览
        </button>
        <input style="visibility: hidden;" id="fileManagerCurrent" />
        <div id="alertContainer"></div>
        <script src="/js/mdb.js"></script>
        <script>
            function updateTime() {
                var now = new Date();
                var utcTime = (now.getTime() / 1000).toFixed(0).toString();
                var xhr = new XMLHttpRequest();
                xhr.open('POST', '/time', true);
                xhr.onreadystatechange = function () {
                    if (xhr.readyState == 4 && xhr.status == 200) {
                        var data = xhr.responseText;
                        displayJson(0, "已发送浏览器时间");
                    }
                };
                xhr.send(utcTime);
            }
            setTimeout(updateTime, 1000);
        </script>
        <script>
            var cwd = '/';
            var currentFilePath = '/';
            var currentFileName = '/';
            var fileManagerCurrent = document.getElementById('fileManagerCurrent');
            function deleteFile(filename) {
                var xhr = new XMLHttpRequest();
                xhr.open('DELETE', '/edit', true);
                xhr.onreadystatechange = function () {
                    if (xhr.readyState == 4 && xhr.status == 200) {
                        var data = xhr.responseText;
                        displayJson(0, "文件已删除");
                        refreshFileList();
                    }
                };
                xhr.send(filename);
                displayJson(0, "已发送请求");
            }
            function downloadFile(content, fileName) {
                var aEle = document.createElement("a");// 创建a标签
                aEle.download = fileName;// 设置下载文件的文件名
                aEle.href = content;// content为后台返回的下载地址
                aEle.target = '_blank';
                aEle.click();
            }
            function refreshFileList() {
                var html_cwd = document.getElementById('html_cwd');
                html_cwd.innerHTML = '当前目录：' + cwd;
                var table = document.getElementById('tableFile');
                while (table.rows.length > 0) {
                    table.deleteRow(0);
                }
                var row = table.insertRow();
                var cell1 = row.insertCell();
                cell1.innerHTML = "加载中...";
                var xhr = new XMLHttpRequest();
                xhr.open('GET', '/list?dir=' + cwd, true);
                xhr.onreadystatechange = function () {
                    if (xhr.readyState == 4 && xhr.status == 200) {
                        var data = JSON.parse(xhr.responseText);
                        used = data["size"];
                        total = data["total"];
                        usageProgress = document.getElementById('usageProgress');
                        usageProgress.style = 'width: ' + String(used / total * 100) + '%;';
                        usageProgress.innerHTML = (used / total * 100).toFixed(0).toString() + '%';
                        html_cwd.innerHTML = '当前目录：' + cwd + '&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp【' + (used / 1024).toFixed(0) + ' KiB / ' + (total / 1024).toFixed(0) + ' KiB 】';
                        data = data["data"];
                        table.deleteRow(0);
                        var row = table.insertRow();
                        var cell1 = row.insertCell();
                        cell1.innerHTML = '文件名';
                        var cell1 = row.insertCell();
                        cell1.innerHTML = '文件大小/字节';
                        // var data = JSON.parse('[{"type":"folder","name":"System Volume Information","size":0},{"type":"file","name":"Test2.app","size":0},{"type":"file","name":"config.json","size":114},{"type":"file","name":"test.app","size":0},{"type":"file","name":"weather.bin","size":1445},{"type":"file","name":"金瓶梅前20.txt.i","size":2492},{"type":"file","name":"金瓶梅前20.txt","size":385173}]');
                        data.forEach(element => {
                            var row = table.insertRow();
                            var cell2 = row.insertCell();
                            var cell3 = row.insertCell();
                            if (element["type"] == 'file') {
                                if (element["size"] > 0) {
                                    cell3.innerHTML = '' + String(element["size"]) + ''
                                }
                                else {
                                    cell3.innerHTML = ''
                                }
                                row.onclick = function () {
                                    prevbody = document.getElementById('filePreviewBody');
                                    prevbody.innerHTML = cwd;
                                    if (cwd != '/') {
                                        prevbody.innerHTML += '/';
                                    }
                                    prevbody.innerHTML += element["name"];
                                    currentFilePath = prevbody.innerHTML;
                                    currentFileName = element["name"];
                                    prev = document.getElementById('openFilePreview');
                                    prev.click();
                                }
                            }
                            else {
                                cell3.innerHTML = "文件夹";
                                row.onclick = function () {
                                    refreshFileList();
                                }
                            }
                            cell2.innerHTML = element["name"];
                        });
                    }
                };
                xhr.send();
            }
            btnRefresh = document.getElementById('btnRefresh');
            btnRefresh.onclick = function () {
                refreshFileList();
            }
            var btnDownloadPreview = document.getElementById('btnDownloadPreview');
            btnDownloadPreview.onclick = function () {
                downloadFile(currentFilePath, currentFileName);
            }
            var btnDeletePreview = document.getElementById('btnDeletePreview');
            btnDeletePreview.onclick = function () {
                deleteFile(currentFilePath);
            }
            var fileInput = document.getElementById("fileInput");
            fileInput.addEventListener("change", function (event) {
                var selectedFile = event.target.files[0];  // 获取用户选择的文件
                console.log("用户选择的文件：", selectedFile);
                let formData = new FormData();
                var tmp = cwd;
                if (tmp != '/')
                    tmp += '/';
                tmp += String(selectedFile.name);
                formData.append("data", event.target.files[0], tmp);
                console.log(tmp);
                const xhr = new XMLHttpRequest();
                xhr.open('POST', '/edit');
                xhr.onreadystatechange = function () {
                    if (xhr.readyState == 4) {
                        if (xhr.status == 200) {
                            displayJson(0, "上传成功！");
                            refreshFileList()
                        }
                        else {
                            displayJson(1, "上传失败！");
                        }
                    }
                }
                xhr.upload.onprogress = function (event) {
                    var uploadProgress = document.getElementById('uploadProgress');
                    var prog = String(Math.ceil((event.loaded / event.total) * 100));
                    uploadProgress.style = 'width: ' + prog + '%;';
                    uploadProgress.innerHTML = prog + "%";
                    if (prog == "100")
                        uploadProgress.className = "progress-bar bg-success";
                    else
                        uploadProgress.className = "progress-bar";
                };
                xhr.send(formData);
                displayJson(0, "已发送请求");
            });
            function upload() {
                fileInput.click();  // 模拟点击文件输入框
            }
            document.getElementById('btnUpload').onclick = upload;
            var btnReboot = document.getElementById('btnReboot');
            btnReboot.onclick = function () {
                var xhr = new XMLHttpRequest();
                xhr.open('POST', '/reboot', true);
                xhr.onreadystatechange = function () {
                    if (xhr.readyState == 4 && xhr.status == 200) {
                        displayJson(0, "完成");
                    }
                };
                xhr.send();
                displayJson(0, "已发送请求");
            }
            refreshFileList();
        </script>
</body>

</html>
